services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desbravadores_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      JWT_KEY: "YxsbP0AvSKylRB9nQQ27V16R30pzwpMJZFQaAc5jAdD"
      JWT_ISSUER: "Desbravadores.Gestao"
      JWT_AUDIENCE: "Desbravadores.Gestao.Web"
      Jwt_ExpiresInMinutes: "120"
      Jwt_RefreshTokenDays: "7"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your environment or .env file}
    expose:
      - "10000"

  nginx:
    image: nginx:1.27-alpine
    container_name: desbravadores_nginx
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

