name: CI - Desbravadores Gestao API

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Locate API project
        id: api
        shell: bash
        run: |
          API_CSPROJ=$(find . -type f -name "Desbravadores.Gestao.Api.csproj" | head -n 1)

          if [ -z "$API_CSPROJ" ]; then
            echo "Projeto da API não encontrado."
            exit 1
          fi

          echo "API encontrada: $API_CSPROJ"
          echo "path=$API_CSPROJ" >> $GITHUB_OUTPUT

      - name: Restore API dependencies
        run: dotnet restore "${{ steps.api.outputs.path }}"

      - name: Build API
        run: dotnet build "${{ steps.api.outputs.path }}" --no-restore --configuration Release

      - name: Run tests if they exist
        shell: bash
        run: |
          TEST_PROJECTS=$(find . -type f \( -name "*Tests.csproj" -o -name "*.Tests.csproj" \))

          if [ -z "$TEST_PROJECTS" ]; then
            echo "Nenhum projeto de testes encontrado. Seguindo pipeline..."
            exit 0
          fi

          while IFS= read -r project; do
            echo "Executando testes em: $project"
            dotnet test "$project" --configuration Release --verbosity normal
          done <<< "$TEST_PROJECTS"

      - name: Publish API
        run: dotnet publish "${{ steps.api.outputs.path }}" --no-build --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desbravadores-api
          path: ./publish